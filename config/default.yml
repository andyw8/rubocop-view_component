ViewComponent/ComponentSuffix:
  Description: 'Enforce -Component suffix for ViewComponent classes.'
  Enabled: true
  VersionAdded: '0.1'
  Severity: convention
  StyleGuide: 'https://viewcomponent.org/best_practices.html'
  ViewComponentParentClasses: []
  ComponentNamespaces: []

ViewComponent/MissingPreview:
  Description: 'Ensure every ViewComponent has a corresponding preview file.'
  Enabled: true
  VersionAdded: '<<next>>'
  Severity: convention
  Include:
    - 'app/components/**/*_component.rb'
  PreviewPaths:
    - test/components/previews
    - spec/components/previews
  ViewComponentParentClasses: []
  ComponentNamespaces: []

ViewComponent/NoGlobalState:
  Description: 'Avoid accessing global state (params, request, session, cookies,
    flash) directly.'
  Enabled: true
  VersionAdded: '0.1'
  Severity: convention
  StyleGuide: 'https://viewcomponent.org/best_practices.html'
  ViewComponentParentClasses: []
  ComponentNamespaces: []

ViewComponent/PreferPrivateMethods:
  Description: 'Suggest making helper methods private.'
  Enabled: true
  VersionAdded: '0.1'
  Severity: convention
  StyleGuide: 'https://viewcomponent.org/best_practices.html'
  AllowedPublicMethods:
    - initialize
    - call
    - before_render
    - before_render_check
    - render?
    - render_in
    - around_render
  AllowedPublicMethodPatterns:
    - "^with_"
  ViewComponentParentClasses: []
  ComponentNamespaces: []

ViewComponent/PreferComposition:
  Description: 'Prefer composition over inheritance for ViewComponents.'
  Enabled: true
  VersionAdded: '0.3'
  Severity: convention
  StyleGuide: 'https://viewcomponent.org/best_practices.html#avoid-inheritance'
  ViewComponentParentClasses: []
  ComponentNamespaces: []

ViewComponent/PreferSlots:
  Description: 'Prefer slots over HTML string parameters.'
  Enabled: true
  VersionAdded: '0.1'
  Severity: convention
  StyleGuide: 'https://viewcomponent.org/best_practices.html'
  ViewComponentParentClasses: []
  ComponentNamespaces: []

ViewComponent/TestRenderedOutput:
  Description: 'Test rendered output instead of component instance methods.'
  Enabled: true
  VersionAdded: '0.3'
  Severity: convention
  StyleGuide: 'https://viewcomponent.org/guide/testing.html'
  Include:
    - 'spec/components/**/*_spec.rb'
    - 'test/components/**/*_test.rb'
  TestPaths: []
